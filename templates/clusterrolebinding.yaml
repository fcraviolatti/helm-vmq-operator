---
# Manager ClusterRoleBinding — consente all'operator di agire in tutti i namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vmq-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "vmq-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vmq-operator.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "vmq-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "vmq-operator.fullname" . }}-proxy-rolebinding
  labels:
    {{- include "vmq-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "vmq-operator.fullname" . }}-proxy-role
subjects:
  - kind: ServiceAccount
    name: {{ include "vmq-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
